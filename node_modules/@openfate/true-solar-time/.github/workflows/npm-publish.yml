name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) requires these permissions
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm to latest (Fixes OIDC 404 bug)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        # Use --provenance to generate a signed proof of the build
        # When Trusted Publishing is set up on NPM, no NPM_TOKEN is needed
        run: npm publish --provenance --access public
